<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CL 시스템 재고 관리 (v40)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>

    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets.react, { runtime: 'classic' }]
            ]
        });
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react-classic">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return localStorage.getItem('inventory_auth_pin') === 'true';
            });
            const [pin, setPin] = useState("");
            const [errorMsg, setErrorMsg] = useState("");
            
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [firebaseRefs, setFirebaseRefs] = useState(null);
            const [histories, setHistories] = useState([]);
            const [selectedHistoryId, setSelectedHistoryId] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            
            const [serverStatus, setServerStatus] = useState("connecting"); 
            const [toastMessage, setToastMessage] = useState("");
            
            const [showWarningOnly, setShowWarningOnly] = useState(false);
            const [searchKeyword, setSearchKeyword] = useState("");
            const [viewMode, setViewMode] = useState("period"); 
            const [selectedPeriod, setSelectedPeriod] = useState(30);
            
            const [customStartDate, setCustomStartDate] = useState("");
            const [customEndDate, setCustomEndDate] = useState("");

            useEffect(() => {
                const handleOnline = () => setServerStatus("connected");
                const handleOffline = () => setServerStatus("disconnected");
                window.addEventListener("online", handleOnline);
                window.addEventListener("offline", handleOffline);
                return () => {
                    window.removeEventListener("online", handleOnline);
                    window.removeEventListener("offline", handleOffline);
                }
            }, []);

            useEffect(() => {
                if (toastMessage) {
                    const timer = setTimeout(() => setToastMessage(""), 3500);
                    return () => clearTimeout(timer);
                }
            }, [toastMessage]);

            useEffect(() => {
                let isMounted = true;
                const initFirebase = async () => {
                    try {
                        const firebaseConfig = {
                            apiKey: "AIzaSyBoJ8xKhYkr1hyTOJlRaPwGFjVoZIuK9Sw",
                            authDomain: "clstpock.firebaseapp.com",
                            projectId: "clstpock",
                            storageBucket: "clstpock.firebasestorage.app",
                            messagingSenderId: "14396365208",
                            appId: "1:14396365208:web:89625d54c26868e06533ed",
                            measurementId: "G-ZFWM8LBF12"
                        };

                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        const appId = 'inventory-tracker-01'; 

                        if (isMounted) {
                            setFirebaseRefs({ db, appId, collection, onSnapshot, addDoc, doc, deleteDoc });
                        }

                        await signInAnonymously(auth);
                        
                        onAuthStateChanged(auth, (user) => {
                            if (isMounted) {
                                setFirebaseUser(user);
                                setServerStatus("connected");
                            }
                        });
                    } catch (err) {
                        console.error("Firebase init error:", err);
                        if (isMounted) setServerStatus("disconnected");
                    }
                };
                initFirebase();
                return () => { isMounted = false; };
            }, []);

            useEffect(() => {
                if (!firebaseUser || !firebaseRefs) return;

                const { db, appId, collection, onSnapshot } = firebaseRefs;
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory_history');

                const unsubscribe = onSnapshot(collRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    
                    data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    
                    setHistories(data);
                    
                    if (data.length > 0) {
                        if (!selectedHistoryId || !data.find(h => h.id === selectedHistoryId)) {
                            setSelectedHistoryId(data[0].id);
                        }
                    } else {
                        setSelectedHistoryId(null);
                    }
                }, (error) => {
                    console.error("Fetch error:", error);
                    setServerStatus("disconnected");
                });

                return () => unsubscribe();
            }, [firebaseUser, selectedHistoryId, firebaseRefs]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (pin === "0501") {
                    setIsAuthenticated(true);
                    localStorage.setItem('inventory_auth_pin', 'true');
                } else {
                    setErrorMsg("비밀번호가 일치하지 않습니다.");
                    setPin("");
                }
            };

            const handleDeleteHistory = async () => {
                if (!firebaseRefs || !selectedHistoryId) return;
                
                const isConfirmed = window.confirm("현재 선택된 히스토리 내역을 완전히 삭제하시겠습니까?\n(삭제 후 복구할 수 없습니다.)");
                if (!isConfirmed) return;

                try {
                    const { db, appId, doc, deleteDoc } = firebaseRefs;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory_history', selectedHistoryId);
                    await deleteDoc(docRef);
                    setToastMessage("지정하신 히스토리가 성공적으로 삭제되었습니다.");
                } catch (error) {
                    console.error("Delete history error:", error);
                    alert("히스토리 삭제 중 오류가 발생했습니다.");
                }
            };

            const parseExcelDate = (val) => {
                if (!val) return null;
                if (val instanceof Date) {
                    if (!isNaN(val.getTime())) return val;
                    return null;
                }
                if (typeof val === 'number') {
                    return new Date((val - 25569) * 86400 * 1000);
                }
                const str = String(val).trim().replace(/\./g, '-').replace(/\//g, '-').replace(" ", "T");
                const d = new Date(str);
                if (!isNaN(d.getTime())) return d;
                return null;
            };

            const handleFileUpload = async (e) => {
                // v40: 여러 파일을 동시에 업로드할 수 있도록 배열로 변환
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                setIsUploading(true);

                try {
                    let rawStock = [];
                    let rawOutbound = [];
                    let isStockFile = false;
                    let isOutboundFile = false;
                    let hasParsedStockHeader = false;
                    let hasParsedOutboundHeader = false;

                    // 여러 파일을 병렬로 읽어들임
                    const fileReads = files.map(file => {
                        return new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = (evt) => resolve({ file, data: evt.target.result });
                            reader.onerror = reject;
                            reader.readAsBinaryString(file);
                        });
                    });

                    const results = await Promise.all(fileReads);

                    for (const result of results) {
                        const { file, data: fileString } = result;
                        let wb;
                        
                        if (fileString.includes('<table') || fileString.includes('<TABLE') || fileString.includes('<?xml')) {
                            console.warn(`[${file.name}] HTML/XML 기반 가짜 엑셀 감지. 자체 스크래핑 가동...`);
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(fileString, 'text/html');
                            const table = doc.querySelector('table');
                            
                            if (!table) {
                                throw new Error(`[${file.name}] 문서 내에서 표(Table)를 찾을 수 없습니다.`);
                            }
                            wb = XLSX.utils.table_to_book(table, { raw: true });
                        } else {
                            wb = XLSX.read(fileString, { type: 'binary' });
                        }

                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const sheetData = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: '' });
                        const headerRow = sheetData[0] || [];
                        
                        const hasStockKeywords = headerRow.some(k => typeof k === 'string' && (k.includes('현재고') || k.includes('가용재고') || k.includes('안전재고')));
                        const hasOutboundKeywords = headerRow.some(k => typeof k === 'string' && (k.includes('출고일시') || k.includes('출고량') || k.includes('주문일')));

                        if (wb.SheetNames.length >= 2 && !file.name.toLowerCase().includes('.csv')) {
                            isStockFile = true;
                            isOutboundFile = true;
                            const sData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, raw: true, defval: '' });
                            const oData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]], { header: 1, raw: true, defval: '' });
                            
                            rawStock = hasParsedStockHeader ? rawStock.concat(sData.slice(1)) : sData;
                            rawOutbound = hasParsedOutboundHeader ? rawOutbound.concat(oData.slice(1)) : oData;
                            hasParsedStockHeader = true;
                            hasParsedOutboundHeader = true;
                        } else {
                            if (hasStockKeywords) {
                                isStockFile = true;
                                rawStock = hasParsedStockHeader ? rawStock.concat(sheetData.slice(1)) : sheetData;
                                hasParsedStockHeader = true;
                            } else if (hasOutboundKeywords) {
                                isOutboundFile = true;
                                rawOutbound = hasParsedOutboundHeader ? rawOutbound.concat(sheetData.slice(1)) : sheetData;
                                hasParsedOutboundHeader = true;
                            } else {
                                throw new Error(`[${file.name}] 엑셀 내부에 필수 헤더가 존재하지 않습니다.`);
                            }
                        }
                    }

                    let latestHistory = histories.length > 0 ? histories[0] : null;
                    
                    const findIdxPriority = (header, keywords, fallback) => {
                        for (const k of keywords) {
                            const idx = header.findIndex(col => String(col).trim() === k);
                            if (idx !== -1) return idx;
                        }
                        return fallback;
                    };

                    const outboundMap = {};
                    let globalMaxDateObj = new Date(0);
                    let baseTime = latestHistory ? latestHistory.baseDate : new Date().getTime();
                    
                    const newUploadedDates = new Set();
                    let header2 = [];
                    let h2DateIdx = -1;
                    let h2NameIdx = -1;
                    let h2QtyIdx = -1;

                    if (isOutboundFile) {
                        header2 = rawOutbound[0] || [];
                        h2DateIdx = findIdxPriority(header2, ['출고일시', '주문일'], 6);
                        h2NameIdx = findIdxPriority(header2, ['자사 상품명', '상품명'], 7);
                        h2QtyIdx = findIdxPriority(header2, ['출고량', '수량'], 8);

                        rawOutbound.forEach((row, idx) => {
                            if (idx === 0 || !row || row.length === 0) return;
                            const d = parseExcelDate(row[h2DateIdx]);
                            if (d && !isNaN(d.getTime())) {
                                const dKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                newUploadedDates.add(dKey);
                                
                                if (d.getTime() > globalMaxDateObj.getTime()) {
                                    globalMaxDateObj = d;
                                }
                            }
                        });

                        if (globalMaxDateObj.getTime() > 0) {
                            const baseDateObj = new Date(globalMaxDateObj.getFullYear(), globalMaxDateObj.getMonth(), globalMaxDateObj.getDate(), 23, 59, 59, 999);
                            baseTime = baseDateObj.getTime();
                        }
                    }

                    if (latestHistory) {
                        latestHistory.items.forEach(item => {
                            const preservedDaily = { ...(item.daily || {}) };
                            
                            if (isOutboundFile) {
                                newUploadedDates.forEach(dateStr => {
                                    delete preservedDaily[dateStr];
                                });
                            }
                            
                            outboundMap[item.itemName] = {
                                out_30: 0,
                                out_15: 0,
                                out_7: 0,
                                daily: preservedDaily
                            };
                        });
                    }

                    if (isOutboundFile) {
                        const baseDateForRange = new Date(baseTime);
                        const time30 = new Date(baseDateForRange.getFullYear(), baseDateForRange.getMonth(), baseDateForRange.getDate() - 29, 0, 0, 0, 0).getTime();
                        const time15 = new Date(baseDateForRange.getFullYear(), baseDateForRange.getMonth(), baseDateForRange.getDate() - 14, 0, 0, 0, 0).getTime();
                        const time7 = new Date(baseDateForRange.getFullYear(), baseDateForRange.getMonth(), baseDateForRange.getDate() - 6, 0, 0, 0, 0).getTime();

                        rawOutbound.forEach((row, idx) => {
                            if (idx === 0 || !row || row.length === 0) return;
                            
                            const itemName = String(row[h2NameIdx] || '').trim();
                            const amtStr = String(row[h2QtyIdx] || "0").replace(/,/g, '');
                            const amt = parseFloat(amtStr) || 0;
                            
                            if (!itemName) return;
                            const d = parseExcelDate(row[h2DateIdx]);
                            if (!d || isNaN(d.getTime())) return;
                            
                            if (!outboundMap[itemName]) {
                                outboundMap[itemName] = { out_30: 0, out_15: 0, out_7: 0, daily: {} };
                            }
                            
                            const dKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            outboundMap[itemName].daily[dKey] = (outboundMap[itemName].daily[dKey] || 0) + amt;
                        });

                        Object.keys(outboundMap).forEach(itemName => {
                            let sum30 = 0, sum15 = 0, sum7 = 0;
                            Object.entries(outboundMap[itemName].daily).forEach(([dStr, amt]) => {
                                if (!dStr.includes('-')) return;
                                const [y, m, d] = dStr.split('-');
                                const dt = new Date(y, m - 1, d, 12, 0, 0).getTime();
                                
                                if (dt >= time30 && dt <= baseTime) sum30 += amt;
                                if (dt >= time15 && dt <= baseTime) sum15 += amt;
                                if (dt >= time7 && dt <= baseTime) sum7 += amt;
                            });
                            outboundMap[itemName].out_30 = sum30;
                            outboundMap[itemName].out_15 = sum15;
                            outboundMap[itemName].out_7 = sum7;
                        });
                    }

                    const parsedItemsMap = new Map();

                    if (latestHistory) {
                        latestHistory.items.forEach(item => {
                            parsedItemsMap.set(item.itemName, { ...item });
                        });
                    }

                    if (isStockFile) {
                        const header1 = rawStock[0] || [];
                        const h1NameIdx = findIdxPriority(header1, ['자사 상품명', '상품명'], 4);
                        const h1StockIdx = findIdxPriority(header1, ['가용재고', '현재고', '총재고'], 5); 
                        const h1SafeStockIdx = findIdxPriority(header1, ['안전재고'], 9); 

                        rawStock.forEach((row, idx) => {
                            if (idx === 0 || !row) return; 
                            const itemName = String(row[h1NameIdx] || '').trim(); 
                            const stockStr = String(row[h1StockIdx] || "0").replace(/,/g, '');
                            const stock = parseFloat(stockStr) || 0; 
                            
                            const safeStockStr = String(row[h1SafeStockIdx] || "0").replace(/,/g, '');
                            const safeStock = parseFloat(safeStockStr) || 0;

                            if (!itemName || itemName === '상품명' || itemName === '자사 상품명') return;
                            
                            const existing = parsedItemsMap.get(itemName) || {};
                            parsedItemsMap.set(itemName, {
                                ...existing,
                                itemName,
                                stock,
                                safeStock
                            });
                        });
                    }

                    const finalItems = Array.from(parsedItemsMap.values()).map(item => {
                        const outData = outboundMap[item.itemName] || { out_30: 0, out_15: 0, out_7: 0, daily: {} };
                        return {
                            ...item,
                            out_30: outData.out_30,
                            out_15: outData.out_15,
                            out_7: outData.out_7,
                            daily: outData.daily
                        };
                    });

                    const nextVersion = `V${histories.length + 1}`;
                    const now = new Date().toISOString();
                    
                    const newDocData = { 
                        version: nextVersion, 
                        createdAt: now, 
                        baseDate: baseTime,
                        items: finalItems 
                    };

                    if (firebaseRefs) {
                        const { db, appId, collection, addDoc } = firebaseRefs;
                        const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory_history');
                        const newDoc = await addDoc(collRef, newDocData);
                        setSelectedHistoryId(newDoc.id);
                        
                        let msg = "업데이트 완료 ";
                        if (isStockFile && isOutboundFile) msg += "(재고/출고 통합 반영)";
                        else if (isStockFile) msg += "(현재고 단독)";
                        else if (isOutboundFile) msg += "(출고수량 단독)";
                        
                        const displayDate = new Date(baseTime).toLocaleDateString();
                        setToastMessage(`${msg} - 겹치는 날짜 완벽 덮어쓰기 완료 / 기준일: ${displayDate}`);
                    }

                } catch (error) {
                    console.error("Excel parse error:", error);
                    const errMsg = error.message ? error.message.toLowerCase() : "";
                    if (errMsg.includes('password') || errMsg.includes('암호')) {
                        alert("🚨 파일 업로드 실패 (비밀번호 잠금)\n\n업로드하신 엑셀 파일에 [비밀번호]가 설정되어 있어 보안상 브라우저가 데이터를 읽을 수 없습니다.\n\n[해결 방법]\n1. 엑셀(Excel) 프로그램에서 해당 파일을 엽니다.\n2. '다른 이름으로 저장'을 클릭합니다.\n3. 도구(일반 옵션)에서 설정된 비밀번호를 지우고 저장합니다.\n4. 비밀번호가 해제된 파일을 다시 업로드해 주세요.");
                    } else {
                        alert(`❌ 엑셀 분석 실패\n\n알 수 없는 형식의 파일입니다. 엑셀에서 파일을 열고 [다른 이름으로 저장] > [Excel 통합 문서(*.xlsx)]로 다시 저장한 뒤 업로드해 주세요.\n\n(상세에러: ${error.message})`);
                    }
                } finally {
                    setIsUploading(false);
                    e.target.value = null; // 입력 초기화
                }
            };

            const formatDate = (isoString) => {
                const d = new Date(isoString);
                return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            };

            const getFileNameDate = (isoString) => {
                const d = new Date(isoString);
                return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}_${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}`;
            };

            const currentData = useMemo(() => {
                return histories.find(h => h.id === selectedHistoryId) || null;
            }, [histories, selectedHistoryId]);

            useEffect(() => {
                if (currentData && currentData.baseDate) {
                    const end = new Date(currentData.baseDate);
                    const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    
                    setCustomEndDate(fmt(end));
                    setCustomStartDate(fmt(end));
                }
            }, [currentData]);

            const displayDateRange = useMemo(() => {
                if (!currentData || !currentData.baseDate) return "";
                if (viewMode === 'period') {
                    const end = new Date(currentData.baseDate);
                    const start = new Date(end.getFullYear(), end.getMonth(), end.getDate() - (selectedPeriod - 1));
                    return `${start.getMonth()+1}/${start.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;
                } else {
                    if (!customStartDate || !customEndDate) return "날짜를 선택해주세요";
                    const start = new Date(customStartDate);
                    const end = new Date(customEndDate);
                    
                    if (start.getTime() === end.getTime()) {
                        return `${start.getMonth()+1}/${start.getDate()}`;
                    }
                    
                    const minDate = start < end ? start : end;
                    const maxDate = start > end ? start : end;
                    return `${minDate.getMonth()+1}/${minDate.getDate()} ~ ${maxDate.getMonth()+1}/${maxDate.getDate()}`;
                }
            }, [currentData, selectedPeriod, viewMode, customStartDate, customEndDate]);

            const processedItems = useMemo(() => {
                if (!currentData) return [];
                
                let sTime = 0, eTime = 0;
                if (viewMode === 'custom' && customStartDate && customEndDate) {
                    const parseSafe = (dStr, isEnd) => {
                        const [y, m, d] = dStr.split('-');
                        return isEnd ? new Date(y, m - 1, d, 23, 59, 59, 999).getTime() : new Date(y, m - 1, d, 0, 0, 0, 0).getTime();
                    };
                    sTime = parseSafe(customStartDate, false);
                    eTime = parseSafe(customEndDate, true);
                    if (sTime > eTime) {
                        const temp = sTime;
                        sTime = eTime;
                        eTime = temp;
                    }
                }

                return currentData.items.map(item => {
                    let outbound = 0;
                    let periodToUse = 30;

                    if (viewMode === 'period') {
                        const isLegacy = item.out_30 === undefined;
                        if (isLegacy) {
                            outbound = item.outbound || 0;
                            periodToUse = currentData.period || 30; 
                        } else {
                            outbound = item[`out_${selectedPeriod}`] || 0;
                            periodToUse = selectedPeriod;
                        }
                    } else if (viewMode === 'custom') {
                        if (sTime > 0 && eTime > 0 && item.daily) {
                            let sum = 0;
                            Object.entries(item.daily).forEach(([dStr, amt]) => {
                                if (!dStr.includes('-')) return;
                                const [y, m, d] = dStr.split('-');
                                const dt = new Date(y, m - 1, d, 12, 0, 0).getTime();
                                if (dt >= sTime && dt <= eTime) sum += amt;
                            });
                            outbound = sum;
                            const days = Math.max(1, Math.ceil((eTime - sTime) / 86400000));
                            periodToUse = days;
                        }
                    }
                    
                    const daily = outbound / periodToUse;
                    let availableDays = null;
                    if (daily > 0) {
                        availableDays = Math.floor(item.stock / daily);
                    }

                    let mainGroup = null;
                    let displayName = item.itemName; 
                    const match = item.itemName.match(/^(\d+)/);
                    if (match) {
                        mainGroup = match[1]; 
                    }
                    
                    return {
                        ...item,
                        safeStock: item.safeStock || 0, 
                        _outboundToDisplay: outbound,
                        _dailyToDisplay: daily,
                        _availableDays: availableDays,
                        _periodToUse: periodToUse,
                        _mainGroup: mainGroup,
                        _displayName: displayName
                    };
                }).filter(item => {
                    if (!item._mainGroup) return false;
                    
                    if (searchKeyword && !item._displayName.toLowerCase().includes(searchKeyword.toLowerCase())) {
                        return false;
                    }

                    if (showWarningOnly) {
                        return item._availableDays !== null && item._availableDays < 30 && item.stock > 0;
                    }
                    return true;
                });
            }, [currentData, showWarningOnly, selectedPeriod, viewMode, customStartDate, customEndDate, searchKeyword]);

            const exportToExcel = () => {
                if (!processedItems || processedItems.length === 0) {
                    alert("다운로드할 데이터가 없습니다.");
                    return;
                }

                let dynamicColName = `출고수량`;
                if (viewMode === 'period') {
                    dynamicColName = `출고수량(${selectedPeriod}일)`;
                } else if (viewMode === 'custom' && customStartDate && customEndDate) {
                    dynamicColName = `출고수량(${displayDateRange})`;
                }

                const exportData = processedItems.map(item => {
                    const rowData = {
                        "상품명": item._displayName,
                        "총재고": item.stock,
                        "안전재고": item.safeStock || 0,
                        [dynamicColName]: item._outboundToDisplay
                    };
                    
                    if (viewMode === 'period') {
                        rowData["일평균"] = item._outboundToDisplay > 0 ? item._dailyToDisplay.toFixed(1) : "-";
                        rowData["예상 소진일(일)"] = item._availableDays === null ? "출고 없음" : item._availableDays;
                    }
                    return rowData;
                });

                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                
                const wscols = viewMode === 'period' 
                    ? [{wch: 40}, {wch: 10}, {wch: 10}, {wch: 20}, {wch: 15}, {wch: 15}]
                    : [{wch: 40}, {wch: 10}, {wch: 10}, {wch: 25}];
                worksheet['!cols'] = wscols;

                XLSX.utils.book_append_sheet(workbook, worksheet, "재고소진예상일");
                
                let rangeStr = viewMode === 'period' ? `${selectedPeriod}일` : '지정일';
                
                const currentDownloadTime = new Date().toISOString();
                const fileName = `재고소진분석_${rangeStr}_${getFileNameDate(currentDownloadTime)}.xlsx`;
                XLSX.writeFile(workbook, fileName);
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 border border-slate-200">
                            <div className="text-center mb-8">
                                <div className="bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                    <svg className="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800">보안 접근</h2>
                                <p className="text-sm text-slate-500 mt-2">관리자 권한이 필요합니다.</p>
                            </div>
                            <form onSubmit={handleLogin}>
                                <input 
                                    type="password" 
                                    value={pin}
                                    onChange={(e) => setPin(e.target.value)}
                                    placeholder="비밀번호 입력"
                                    className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-lg tracking-widest font-semibold text-slate-700 mb-4"
                                    autoFocus
                                />
                                {errorMsg && <p className="text-red-500 text-sm text-center mb-4">{errorMsg}</p>}
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-colors shadow-md">
                                    접속하기
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 relative">
                    
                    {toastMessage && (
                        <div 
                            className="fixed inset-0 z-50 flex justify-center items-start pt-6"
                            onClick={() => setToastMessage("")}
                        >
                            <div 
                                className="bg-white border border-slate-200 shadow-xl rounded-2xl p-4 flex items-center gap-4 animate-slide-down max-w-sm w-full mx-4 cursor-default"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="bg-green-100 text-green-600 rounded-full p-2.5 flex-shrink-0">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <div className="flex-grow">
                                    <h4 className="text-sm font-bold text-slate-800">시스템 알림</h4>
                                    <p className="text-xs text-slate-500 mt-0.5">{toastMessage}</p>
                                </div>
                                <button onClick={() => setToastMessage("")} className="text-slate-400 hover:text-slate-600 p-1 flex-shrink-0">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="glass-effect relative z-30 border-b border-slate-200 px-6 py-4 shadow-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                        <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                            <h1 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                                📊 CL 시스템 재고 관리 <span className="text-slate-400 font-semibold text-sm">(v40)</span>
                            </h1>
                            
                            <div className="flex items-center gap-1.5 bg-slate-100 px-2.5 py-1 rounded-full w-fit">
                                {serverStatus === 'connected' ? (
                                    <>
                                        <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                        <span className="text-xs font-bold text-green-700">실시간 연동 중</span>
                                    </>
                                ) : serverStatus === 'disconnected' ? (
                                    <>
                                        <div className="w-2 h-2 rounded-full bg-red-500"></div>
                                        <span className="text-xs font-bold text-red-600">서버 연결 끊김</span>
                                    </>
                                ) : (
                                    <>
                                        <div className="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                                        <span className="text-xs font-bold text-yellow-700">연결 중...</span>
                                    </>
                                )}
                            </div>
                        </div>
                        
                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto">
                            <a 
                                href="https://arxotn-git.github.io/yorgo" 
                                className="px-4 py-2 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 text-sm font-bold rounded-lg shadow-sm transition-colors flex justify-center items-center gap-2"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                로켓 & N배송 재고 현황
                            </a>
                        </div>
                    </header>

                    <main className="flex-grow p-4 md:p-8 space-y-6 max-w-7xl mx-auto w-full">
                        
                        {currentData && (
                            <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 border-l-4 border-l-indigo-500">
                                
                                <div className="flex flex-col gap-3">
                                    <div className="flex items-center gap-2">
                                        <h2 className="text-lg font-bold text-slate-800">통합 분석 리포트</h2>
                                        {displayDateRange && (
                                            <span className="bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded-md">
                                                🗓️ 집계구간: {displayDateRange}
                                            </span>
                                        )}
                                    </div>
                                    <p className="text-sm text-slate-500">마지막 업데이트: {formatDate(currentData.createdAt)}</p>

                                    <div className="flex bg-slate-100 p-1 rounded-lg w-fit mt-1">
                                        <button 
                                            onClick={() => setViewMode('period')}
                                            className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${viewMode === 'period' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                        >기간별 분석</button>
                                        <button 
                                            onClick={() => setViewMode('custom')}
                                            className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${viewMode === 'custom' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                        >일자 직접 지정</button>
                                    </div>

                                    <div className="flex flex-wrap items-center gap-3">
                                        {viewMode === 'period' ? (
                                            <div className="flex items-center gap-3 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                                <span className="text-sm font-bold text-slate-700 pl-2">분석 기준일:</span>
                                                <div className="flex gap-1">
                                                    <button onClick={() => setSelectedPeriod(30)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${selectedPeriod === 30 ? 'bg-white shadow-sm text-indigo-700 border border-slate-200' : 'text-slate-500 hover:bg-slate-200'}`}>30일</button>
                                                    <button onClick={() => setSelectedPeriod(15)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${selectedPeriod === 15 ? 'bg-white shadow-sm text-indigo-700 border border-slate-200' : 'text-slate-500 hover:bg-slate-200'}`}>15일</button>
                                                    <button onClick={() => setSelectedPeriod(7)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${selectedPeriod === 7 ? 'bg-white shadow-sm text-indigo-700 border border-slate-200' : 'text-slate-500 hover:bg-slate-200'}`}>7일</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center gap-2 bg-indigo-50 p-1.5 rounded-xl border border-indigo-200">
                                                <span className="text-sm font-bold text-indigo-800 pl-2">출고일 구간:</span>
                                                <input type="date" value={customStartDate} onChange={(e) => setCustomStartDate(e.target.value)} className="px-2 py-1.5 text-sm font-bold text-slate-700 rounded-lg border border-slate-300 focus:outline-none focus:border-indigo-500"/>
                                                <span className="text-indigo-400 font-bold">~</span>
                                                <input type="date" value={customEndDate} onChange={(e) => setCustomEndDate(e.target.value)} className="px-2 py-1.5 text-sm font-bold text-slate-700 rounded-lg border border-slate-300 focus:outline-none focus:border-indigo-500"/>
                                            </div>
                                        )}

                                        <div className="relative">
                                            <input 
                                                type="text" 
                                                placeholder="🔍 상품명 검색..." 
                                                value={searchKeyword}
                                                onChange={(e) => setSearchKeyword(e.target.value)}
                                                className="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-700 focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400 w-48 transition-all"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col items-end gap-3 w-full xl:w-auto mt-4 xl:mt-0">
                                    
                                    {/* v40: 히스토리 선택 및 삭제 UI 완전 비활성화 (보이지 않게 제거) */}

                                    <div className="flex flex-wrap items-center justify-end gap-3 w-full">
                                        <button 
                                            onClick={() => setShowWarningOnly(!showWarningOnly)}
                                            className={`px-4 py-2.5 rounded-lg text-sm font-bold transition-colors border shadow-sm ${showWarningOnly ? 'bg-red-50 text-red-600 border-red-200' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'}`}
                                        >
                                            {showWarningOnly ? '전체 목록 보기' : '🚨 30일 이내 품절 예상'}
                                        </button>
                                        
                                        <button 
                                            onClick={exportToExcel}
                                            className="px-4 py-2.5 rounded-lg text-sm font-bold bg-green-600 hover:bg-green-700 text-white transition-colors shadow-sm flex items-center gap-2"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                            엑셀 다운로드
                                        </button>

                                        <div className="bg-slate-100 px-4 py-2.5 rounded-lg text-sm font-semibold text-slate-700">
                                            총 <span className="text-indigo-600">{processedItems.length}</span>개 품목
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                            <div style={{ maxHeight: '800px' }} className="overflow-y-auto custom-scrollbar">
                                <table className="w-full min-w-[850px] text-sm text-slate-600 table-fixed">
                                    <thead className="bg-slate-50 sticky top-0 z-40 shadow-sm ring-1 ring-slate-200">
                                        <tr>
                                            {/* v40: 어떤 뷰 모드든 앞 3개의 열 너비를 100% 동일하게 강제 고정 */}
                                            <th scope="col" className="w-[34%] px-4 py-4 text-[15px] font-extrabold border-b-2 border-slate-300 text-slate-800 text-left transition-all">
                                                상품명
                                            </th>
                                            <th scope="col" className="w-[10%] px-4 py-4 text-[15px] font-extrabold border-b-2 border-slate-300 text-slate-800 text-right transition-all">
                                                총재고
                                            </th>
                                            <th scope="col" className="w-[10%] px-4 py-4 text-[15px] font-extrabold border-b-2 border-slate-300 text-slate-800 text-right transition-all">
                                                안전재고
                                            </th>
                                            <th scope="col" className={`${viewMode === 'period' ? 'w-[14%]' : 'w-[46%]'} px-4 py-3 text-[15px] font-extrabold border-b-2 border-slate-300 text-slate-800 text-right leading-tight transition-all`}>
                                                {viewMode === 'period' ? `출고수량(${selectedPeriod}일)` : '지정일 출고수량'}
                                            </th>
                                            {viewMode === 'period' && (
                                                <>
                                                    <th scope="col" className="w-[12%] px-4 py-4 text-[15px] font-extrabold border-b-2 border-slate-300 text-slate-800 text-right transition-all">일평균</th>
                                                    <th scope="col" className="w-[20%] px-4 py-4 text-[15px] font-extrabold text-indigo-900 bg-indigo-100/50 border-b-2 border-indigo-200 text-right transition-all">예상 소진일</th>
                                                </>
                                            )}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {currentData ? (
                                            processedItems.length > 0 ? (
                                                processedItems.map((item, idx) => {
                                                    const isWarning = item._availableDays !== null && item._availableDays < 30;
                                                    const isGroupChanged = idx > 0 && processedItems[idx - 1]._mainGroup !== item._mainGroup;
                                                    const borderClass = isGroupChanged ? 'border-t-2 border-t-slate-400' : 'border-t border-slate-100';
                                                    
                                                    return (
                                                        <tr key={idx} className={`transition-colors ${borderClass} ${isWarning ? 'bg-red-50 hover:bg-red-100' : 'bg-white hover:bg-slate-50'}`}>
                                                            <td className="px-4 py-4">
                                                                <div className={`font-bold truncate ${isWarning ? 'text-red-900' : 'text-slate-800'}`} title={item._displayName}>
                                                                    {item._displayName}
                                                                </div>
                                                            </td>
                                                            <td className={`px-4 py-4 text-right font-black text-[15px] ${isWarning ? 'text-red-800' : 'text-slate-900'}`}>
                                                                {item.stock.toLocaleString()}
                                                            </td>
                                                            <td className={`px-4 py-4 text-right font-black text-[15px] ${isWarning ? 'text-red-800' : 'text-slate-500'}`}>
                                                                {item.safeStock.toLocaleString()}
                                                            </td>
                                                            <td className={`px-4 py-4 text-right font-black text-[15px] ${isWarning ? 'text-red-800' : 'text-slate-700'}`}>
                                                                {item._outboundToDisplay.toLocaleString()}
                                                            </td>
                                                            {viewMode === 'period' && (
                                                                <>
                                                                    <td className={`px-4 py-4 text-right font-black text-[15px] ${isWarning ? 'text-red-700' : 'text-slate-600'}`}>
                                                                        {item._outboundToDisplay > 0 ? item._dailyToDisplay.toFixed(1) : '-'}
                                                                    </td>
                                                                    <td className={`px-4 py-4 text-right font-black text-[15px] ${isWarning ? 'text-red-600' : 'text-indigo-600'}`}>
                                                                        {item._availableDays === null ? (
                                                                            <span className="text-slate-400 font-bold text-[14px]">출고 없음</span>
                                                                        ) : (
                                                                            <span>{item._availableDays.toLocaleString()} 일</span>
                                                                        )}
                                                                    </td>
                                                                </>
                                                            )}
                                                        </tr>
                                                    );
                                                })
                                            ) : (
                                                <tr>
                                                    <td colSpan={viewMode === 'period' ? "6" : "4"} className="px-6 py-16 text-center text-slate-500 font-medium border-t border-slate-100">
                                                        검색 조건에 일치하는 품목이 없습니다.
                                                    </td>
                                                </tr>
                                            )
                                        ) : (
                                            <tr>
                                                <td colSpan={viewMode === 'period' ? "6" : "4"} className="px-6 py-16 text-center text-slate-500 font-medium border-t border-slate-100">
                                                    등록된 데이터가 없습니다. 아래에서 엑셀 파일을 업로드해주세요.
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mt-6">
                            <div className="mb-4 flex items-center justify-between">
                                <h4 className="font-extrabold text-slate-800 text-base flex items-center gap-2">📂 엑셀 파일 통합/개별 업데이트</h4>
                                <span className="text-xs text-slate-400">데이터는 자동으로 클라우드에 안전하게 저장됩니다.</span>
                            </div>
                            <div className={`border-2 border-dashed rounded-xl p-8 text-center transition-colors relative ${isUploading ? 'border-slate-300 bg-slate-50' : 'border-indigo-300 hover:border-indigo-500 bg-indigo-50/30 cursor-pointer'}`}>
                                {/* v40: multiple 속성을 추가하여 여러 파일을 동시에 첨부할 수 있게 지원 */}
                                <input type="file" multiple accept=".xlsx,.xls,.csv" onChange={handleFileUpload} disabled={isUploading} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10 disabled:cursor-not-allowed"/>
                                {isUploading ? (
                                    <div className="flex flex-col items-center justify-center">
                                        <div className="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                                        <h5 className="text-sm font-bold text-slate-600">데이터를 분석 및 병합 중입니다...</h5>
                                    </div>
                                ) : (
                                    <>
                                        <div className="bg-white w-12 h-12 rounded-full shadow-sm flex items-center justify-center mx-auto mb-3 text-2xl">📥</div>
                                        <h5 className="text-sm font-extrabold text-indigo-900">클릭하거나 여러 파일을 드롭하세요</h5>
                                        <p className="text-xs text-slate-400 mt-1">현재고 엑셀과 출고수량 엑셀을 동시에 드래그하셔도 모두 처리됩니다.</p>
                                    </>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
